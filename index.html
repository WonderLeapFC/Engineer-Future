<!-- WonderLeap: Collect all stage scores, submit ONE cumulative score after final stage -->
<script>
(function(){
  'use strict';
  // Suppress console logs in production (keep [WL] logs only)
  if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
    var origLog = console.log; var origWarn = console.warn;
    console.log = function() { if (arguments[0] && String(arguments[0]).indexOf('[WL]') === 0) origLog.apply(console, arguments); };
    console.warn = function() {};
  }
  var TOTAL_STAGES = 6;
  var stagesDone = 0;
  var stageScores = [];
  var realFetch = window.fetch;

  var params = new URLSearchParams(window.location.search);
  var hmacSecret = params.get('hmacSecret') || '';

  async function signPayload(data) {
    var msg = [data.sessionId, data.score, data.stars, data.timeSpent, data.attempts, data.accuracy].join(':');
    var enc = new TextEncoder();
    var key = await crypto.subtle.importKey('raw', enc.encode(hmacSecret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    var sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
    return Array.from(new Uint8Array(sig)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }

  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.includes('submit-score') && opts && opts.method === 'POST') {
      var body;
      try { body = JSON.parse(opts.body); } catch(e) { return realFetch.apply(this, arguments); }

      stagesDone++;
      stageScores.push({
        score: body.score || 0,
        timeSpent: body.timeSpent || 0,
        attempts: body.attempts || 0,
        accuracy: body.accuracy || 0
      });

      console.log('[WL] Stage ' + stagesDone + '/' + TOTAL_STAGES + ' — score: ' + body.score + ', time: ' + body.timeSpent + 's');

      if (stagesDone < TOTAL_STAGES) {
        console.log('[WL] Stage ' + stagesDone + ' captured — holding (no postMessage will fire)');
        return new Promise(function(){});
      }

      var totalScore = 0, totalTime = 0, totalAttempts = 0, totalAccuracy = 0;
      stageScores.forEach(function(s) {
        totalScore += s.score;
        totalTime += s.timeSpent;
        totalAttempts += s.attempts;
        totalAccuracy += s.accuracy;
      });

      var finalScore = Math.round(totalScore / TOTAL_STAGES);
      var finalAccuracy = Math.round(totalAccuracy / TOTAL_STAGES);
      var finalStars = finalScore >= 90 ? 3 : finalScore >= 60 ? 2 : finalScore >= 30 ? 1 : 0;

      console.log('[WL] All stages done — Final: score=' + finalScore + ', stars=' + finalStars + ', time=' + totalTime + 's, accuracy=' + finalAccuracy + '%');

      var finalPayload = {
        sessionId: body.sessionId,
        score: finalScore,
        stars: finalStars,
        timeSpent: totalTime,
        attempts: totalAttempts,
        accuracy: finalAccuracy
      };

      return signPayload(finalPayload).then(function(sig) {
        finalPayload.signature = sig;
        console.log('[WL] Submitting cumulative score to backend...');
        return realFetch.call(null, url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(finalPayload)
        });
      });
    }
    return realFetch.apply(this, arguments);
  };

  console.log('[WL] Score interceptor loaded — will collect ' + TOTAL_STAGES + ' stages before submitting');
})();
</script>
